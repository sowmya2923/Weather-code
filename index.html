<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dusk1: #1a0533;
            --dusk2: #2d0a4e;
            --dusk3: #5c1a6e;
            --horizon: #c4445a;
            --glow: #f4823a;
            --gold: #ffc857;
            --pink: #ff6b9d;
            --teal: #00d4b4;
            --text: #fff5f0;
            --text-dim: #c9a8c0;
            --card-bg: rgba(45, 10, 78, 0.55);
            --card-border: rgba(244, 130, 58, 0.25);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dusk1);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .sky-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                linear-gradient(180deg,
                    #0d0120 0%,
                    #1a0533 18%,
                    #2d0a4e 35%,
                    #5c1a6e 52%,
                    #a03060 65%,
                    #c4445a 75%,
                    #e06a3a 85%,
                    #f4a23a 93%,
                    #ffd580 100%
                );
        }

        .sky-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            opacity: 0.35;
            pointer-events: none;
        }

        .weather-scene {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55vh;
            z-index: 1;
            pointer-events: none;
        }

        .page-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 52px 20px 120px;
        }

        .header {
            text-align: center;
            margin-bottom: 44px;
            animation: riseUp 0.9s cubic-bezier(0.23,1,0.32,1) both;
        }

        .header-eyebrow {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            opacity: 0.85;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(52px, 10vw, 96px);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -2px;
            background: linear-gradient(160deg, #fff5f0 0%, #ffd580 40%, #f4823a 75%, #c4445a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 24px rgba(244,130,58,0.4));
        }

        .header-tagline {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-dim);
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .search-wrap {
            width: 100%;
            max-width: 520px;
            margin-bottom: 48px;
            animation: riseUp 0.9s 0.12s cubic-bezier(0.23,1,0.32,1) both;
        }

        #form {
            display: flex;
            align-items: center;
            background: rgba(26, 5, 51, 0.65);
            border: 1px solid rgba(244,130,58,0.3);
            border-radius: 100px;
            padding: 6px 6px 6px 26px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 8px 40px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,200,87,0.06) inset,
                0 1px 0 rgba(255,255,255,0.07) inset;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #form:focus-within {
            border-color: rgba(244,130,58,0.6);
            box-shadow:
                0 8px 40px rgba(0,0,0,0.4),
                0 0 0 4px rgba(244,130,58,0.1),
                0 1px 0 rgba(255,255,255,0.07) inset;
        }

        .ico-search {
            width: 16px; height: 16px;
            color: var(--glow);
            opacity: 0.7;
            flex-shrink: 0;
            margin-right: 6px;
        }

        #city {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            padding: 10px 6px;
            min-width: 0;
        }

        #city::placeholder { color: var(--text-dim); opacity: 0.55; }

        #form button {
            flex-shrink: 0;
            background: linear-gradient(135deg, #f4823a 0%, #c4445a 100%);
            border: none;
            border-radius: 100px;
            padding: 12px 30px;
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 700;
            color: #fff5f0;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(196,68,90,0.5);
            transition: transform 0.15s, box-shadow 0.2s;
        }

        #form button:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(244,130,58,0.6);
        }

        #form button:active { transform: scale(0.97); }

        #result-container {
            width: 100%;
            max-width: 860px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 22px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 32px 28px 28px;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow:
                0 12px 48px rgba(0,0,0,0.45),
                inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
            animation: cardPop 0.55s cubic-bezier(0.23,1,0.32,1) both;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 24px 64px rgba(196,68,90,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,200,87,0.5), transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -40px; right: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(244,130,58,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Style the original p tags from the untouched JS */
        .card p:nth-child(1) {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 14px;
        }

        .card p:nth-child(2) {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -3px;
            background: linear-gradient(140deg, #ffd580 0%, #f4823a 60%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .card p:nth-child(3) {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--teal);
            opacity: 0.85;
        }

        @keyframes riseUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.88; transform: scale(1.06); }
        }

        @keyframes floatCloud {
            0%   { transform: translateX(0); }
            50%  { transform: translateX(18px); }
            100% { transform: translateX(0); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.9; }
            50%       { opacity: 0.15; }
        }

        @media (max-width: 580px) {
            .page-wrapper { padding: 36px 14px 100px; }
            .header { margin-bottom: 30px; }
            .search-wrap { margin-bottom: 32px; }
            #form { padding: 5px 5px 5px 18px; }
            #form button { padding: 10px 20px; font-size: 12px; }
            #result-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sky-bg"></div>

    <!-- Scenic SVG illustration -->
    <svg class="weather-scene" viewBox="0 0 1440 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
        <defs>
            <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%"   stop-color="#ffd580" stop-opacity="1"/>
                <stop offset="40%"  stop-color="#f4823a" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#c4445a" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
                <stop offset="0%"  stop-color="#fff8d0"/>
                <stop offset="55%" stop-color="#ffd580"/>
                <stop offset="100%" stop-color="#f4823a"/>
            </radialGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4"/>
            </filter>
            <linearGradient id="mtL" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#4a1070"/>
                <stop offset="100%" stop-color="#1a0533"/>
            </linearGradient>
            <linearGradient id="mtR" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#380e58"/>
                <stop offset="100%" stop-color="#1a0533"/>
            </linearGradient>
            <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#c4445a" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#1a0533" stop-opacity="0.95"/>
            </linearGradient>
            <linearGradient id="cloudG" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffb07c" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#c4445a" stop-opacity="0.45"/>
            </linearGradient>
        </defs>

        <!-- Stars -->
        <circle cx="80"   cy="38"  r="1.3" fill="#fff"    style="animation:twinkle 3.1s 0.2s infinite"/>
        <circle cx="220"  cy="18"  r="1"   fill="#fff"    style="animation:twinkle 2.5s 1.1s infinite"/>
        <circle cx="380"  cy="52"  r="1.5" fill="#ffd580" style="animation:twinkle 4s 0.6s infinite"/>
        <circle cx="560"  cy="28"  r="1.1" fill="#fff"    style="animation:twinkle 3.5s 0.9s infinite"/>
        <circle cx="900"  cy="22"  r="1.3" fill="#fff"    style="animation:twinkle 2.8s 1.5s infinite"/>
        <circle cx="1100" cy="48"  r="0.9" fill="#fff"    style="animation:twinkle 3.2s 0.3s infinite"/>
        <circle cx="1310" cy="32"  r="1.2" fill="#ffd580" style="animation:twinkle 4.2s 0.7s infinite"/>
        <circle cx="150"  cy="88"  r="0.8" fill="#fff"    style="animation:twinkle 2.3s 1.8s infinite"/>
        <circle cx="1200" cy="75"  r="1"   fill="#fff"    style="animation:twinkle 3.8s 0.4s infinite"/>
        <circle cx="460"  cy="70"  r="0.7" fill="#ffb07c" style="animation:twinkle 5s 1.2s infinite"/>
        <circle cx="990"  cy="60"  r="0.8" fill="#fff"    style="animation:twinkle 4.5s 0.8s infinite"/>

        <!-- Sun outer halo -->
        <circle cx="720" cy="195" r="150" fill="url(#sunGlow)" opacity="0.45"/>
        <circle cx="720" cy="195" r="95"  fill="url(#sunGlow)" opacity="0.5"/>

        <!-- Sun body -->
        <circle cx="720" cy="195" r="54" fill="url(#sunCore)" filter="url(#glow)"
            style="animation:pulse 4s ease-in-out infinite; transform-origin:720px 195px"/>

        <!-- Sun rays -->
        <g stroke="#ffd580" stroke-opacity="0.25" stroke-width="1.8" stroke-linecap="round" filter="url(#soft)">
            <line x1="720" y1="128" x2="720" y2="108"/>
            <line x1="720" y1="262" x2="720" y2="282"/>
            <line x1="653" y1="195" x2="633" y2="195"/>
            <line x1="787" y1="195" x2="807" y2="195"/>
            <line x1="673" y1="148" x2="659" y2="134"/>
            <line x1="767" y1="242" x2="781" y2="256"/>
            <line x1="767" y1="148" x2="781" y2="134"/>
            <line x1="673" y1="242" x2="659" y2="256"/>
            <line x1="647" y1="168" x2="632" y2="158"/>
            <line x1="793" y1="222" x2="808" y2="232"/>
        </g>

        <!-- Cloud 1 (left) -->
        <g style="animation:floatCloud 10s ease-in-out infinite">
            <ellipse cx="230" cy="155" rx="95"  ry="28" fill="url(#cloudG)"/>
            <ellipse cx="188" cy="148" rx="58"  ry="24" fill="url(#cloudG)"/>
            <ellipse cx="278" cy="148" rx="52"  ry="22" fill="url(#cloudG)"/>
            <ellipse cx="230" cy="142" rx="40"  ry="18" fill="url(#cloudG)" opacity="0.6"/>
        </g>

        <!-- Cloud 2 (right) -->
        <g style="animation:floatCloud 13s 2.5s ease-in-out infinite">
            <ellipse cx="1190" cy="125" rx="105" ry="26" fill="url(#cloudG)" opacity="0.65"/>
            <ellipse cx="1148" cy="118" rx="60"  ry="21" fill="url(#cloudG)" opacity="0.65"/>
            <ellipse cx="1238" cy="118" rx="55"  ry="19" fill="url(#cloudG)" opacity="0.65"/>
        </g>

        <!-- Cloud 3 (top center, wispy) -->
        <g style="animation:floatCloud 17s 5s ease-in-out infinite" opacity="0.35">
            <ellipse cx="700" cy="92" rx="80" ry="18" fill="url(#cloudG)"/>
            <ellipse cx="668" cy="88" rx="45" ry="14" fill="url(#cloudG)"/>
            <ellipse cx="738" cy="88" rx="42" ry="13" fill="url(#cloudG)"/>
        </g>

        <!-- Back mountains -->
        <polygon points="0,480 0,265 200,120 400,265 400,480"  fill="url(#mtL)" opacity="0.8"/>
        <polygon points="1040,480 1040,255 1250,105 1440,235 1440,480" fill="url(#mtR)" opacity="0.75"/>

        <!-- Snow caps -->
        <polygon points="200,120 178,162 222,162" fill="#fff5f0" opacity="0.25"/>
        <polygon points="1250,105 1228,150 1272,150" fill="#fff5f0" opacity="0.2"/>

        <!-- Front mountains (dark silhouette) -->
        <polygon points="0,480 0,345 210,195 440,305 440,480" fill="#120025"/>
        <polygon points="1000,480 1000,305 1250,185 1440,325 1440,480" fill="#120025"/>

        <!-- Horizon glow -->
        <ellipse cx="720" cy="348" rx="520" ry="38" fill="#f4823a" opacity="0.18" filter="url(#soft)"/>

        <!-- Water -->
        <rect x="0" y="348" width="1440" height="132" fill="url(#water)"/>

        <!-- Sun reflection pillar -->
        <ellipse cx="720" cy="368" rx="55" ry="12" fill="#ffd580" opacity="0.38" filter="url(#soft)"/>
        <rect x="706" y="368" width="28" height="60" fill="url(#water)" opacity="0.2"/>
        <ellipse cx="720" cy="428" rx="30" ry="8" fill="#f4823a" opacity="0.2" filter="url(#soft)"/>

        <!-- Water ripple lines -->
        <g stroke="#f4823a" stroke-opacity="0.18" stroke-width="1.2" stroke-linecap="round">
            <line x1="548" y1="378" x2="665" y2="378"/>
            <line x1="775" y1="378" x2="892" y2="378"/>
            <line x1="572" y1="394" x2="700" y2="394"/>
            <line x1="740" y1="394" x2="868" y2="394"/>
            <line x1="610" y1="412" x2="716" y2="412"/>
            <line x1="724" y1="412" x2="830" y2="412"/>
            <line x1="630" y1="428" x2="720" y2="428"/>
            <line x1="720" y1="428" x2="810" y2="428"/>
        </g>

        <!-- Ground strip -->
        <rect x="0" y="432" width="1440" height="48" fill="#0d0120"/>

        <!-- Tree silhouettes left -->
        <rect x="45"  y="368" width="7"  height="68" fill="#0d0120"/>
        <ellipse cx="49"  cy="356" rx="26" ry="34" fill="#0d0120"/>
        <rect x="100" y="382" width="5"  height="54" fill="#0d0120"/>
        <ellipse cx="103" cy="372" rx="18" ry="24" fill="#0d0120"/>
        <rect x="148" y="390" width="4"  height="46" fill="#0d0120"/>
        <ellipse cx="150" cy="382" rx="14" ry="18" fill="#0d0120"/>

        <!-- Tree silhouettes right -->
        <rect x="1388" y="366" width="7"  height="70" fill="#0d0120"/>
        <ellipse cx="1392" cy="354" rx="26" ry="35" fill="#0d0120"/>
        <rect x="1332" y="380" width="5"  height="56" fill="#0d0120"/>
        <ellipse cx="1335" cy="370" rx="19" ry="25" fill="#0d0120"/>
        <rect x="1285" y="388" width="4"  height="48" fill="#0d0120"/>
        <ellipse cx="1287" cy="380" rx="15" ry="19" fill="#0d0120"/>

        <!-- Flying birds -->
        <g fill="none" stroke="#2a0848" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
            <path d="M470 162 Q477 156 484 162"/>
            <path d="M490 156 Q497 150 504 156"/>
            <path d="M510 164 Q517 158 524 164"/>
        </g>
        <g fill="none" stroke="#2a0848" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
            <path d="M936 182 Q943 176 950 182"/>
            <path d="M957 175 Q964 169 971 175"/>
        </g>
    </svg>

    <div class="page-wrapper">
        <header class="header">
            <p class="header-eyebrow">✦ Real-time forecast</p>
            <h1>Weather</h1>
            <p class="header-tagline">Search any city across the world</p>
        </header>

        <div class="search-wrap">
            <form id="form">
                <svg class="ico-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" placeholder="enter your city name" id="city"/>
                <button>Search</button>
            </form>
        </div>

        <div id="result-container"></div>
    </div>

    <script>
        const form=document.getElementById("form")
        const city=document.getElementById("city")
        const result=document.getElementById("result-container")
        const apikey="39dbeea21e74e1208ac89978bee11a4a"
        form.addEventListener("submit",(e)=>{
            e.preventDefault()
            let url=`https://api.openweathermap.org/data/2.5/weather?q=${city.value}&appid=${apikey}&units=metric`
            fetch(url)
            .then((res)=>{
                console.log(res)
                return res.json()
            })
            .then((res)=>{
                console.log(res)

                if(res.cod=="404"){
                    alert("city not found")
                }
                let{main,sys,name}=res               //Destructuring
                let weatherData={
                    name,country:sys.country,temp:main.temp
                }
                city.value=""
                display(weatherData)
            })
            function display(weatherData){
                console.log(weatherData)
                result.innerHTML+=`
                <div class="card">
                    <p>City:${weatherData.name}</p>
                    <p>Temperature:${weatherData.temp}</p>
                    <p>Country:${weatherData.country}</p>
                    </div>`
            }
        })
    </script>
</body>
</html>
